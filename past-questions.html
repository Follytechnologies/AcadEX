<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadEx — Past Questions</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="icons.css">
  <link rel="stylesheet" href="past-questions.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand"><div class="brand-logo-sm">Ax</div>Acad<span>Ex</span></div>
    <div class="nav-links">
      <a class="nav-link" href="dashboard-200.html">🏠 Dashboard</a>
      <a class="nav-link active" href="past-questions.html">📖 Past Questions</a>
      <a class="nav-link" href="gpa-tracker.html">📊 GPA</a>
      <a class="nav-link" href="assignments.html">📝 Assignments</a>
    </div>
    <div class="nav-user">
      <div class="avatar" id="navAvatar">AB</div>
      <span class="nav-name" id="navUserName">Student</span>
      <button class="btn btn-ghost btn-sm" onclick="AcadEx.logout()">Sign Out</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">Main</div>
      <a class="sidebar-link" href="dashboard-200.html"><span class="icon">🏠</span> Dashboard</a>
      <a class="sidebar-link active" href="past-questions.html"><span class="icon">📖</span> Past Questions</a>
      <a class="sidebar-link" href="gpa-tracker.html"><span class="icon">📊</span> GPA Tracker</a>
      <a class="sidebar-link" href="assignments.html"><span class="icon">📝</span> Assignments</a>
      <div class="sidebar-section">Learning</div>
      <a class="sidebar-link" href="materials.html"><span class="icon">📚</span> Course Materials</a>
      <div class="sidebar-section">Account</div>
      <a class="sidebar-link" href="#" onclick="AcadEx.logout()"><span class="icon">🚪</span> Sign Out</a>
    </aside>

    <main class="main">
      <div class="page-header animate-up">
        <div>
          <h1 class="page-title">📖 Past Questions Library</h1>
          <p class="page-subtitle">Organized by course and semester. Download and prepare like a pro.</p>
        </div>
      </div>

      <div class="search-filter-bar animate-up delay-1">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Search by course or title..." oninput="filterPQ()">
        </div>
        <select class="form-select filter-select" id="semesterFilter" onchange="filterPQ()">
          <option value="">All Semesters</option>
          <option value="First">First Semester</option>
          <option value="Second">Second Semester</option>
        </select>
      </div>

      <div class="pq-grid animate-up delay-2" id="pqGrid"></div>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="past-questions.js"></script>
  <script src="nav.js"></script>
</body>
</html>
