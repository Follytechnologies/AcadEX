<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadEx — Appeals Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="icons.css">
  <link rel="stylesheet" href="appeals-manager.css">
  <link rel="stylesheet" href="accessibility.css">
  <link rel="stylesheet" href="darkmode.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand"><div class="brand-logo-sm">Ax</div>Acad<span>Ex</span></div>
    <div class="nav-links">
      <a class="nav-link" href="lecturer-dashboard.html">Dashboard</a>
      <a class="nav-link" href="upload-materials.html">Upload</a>
      <a class="nav-link" href="manage-cbt.html">CBT</a>
      <a class="nav-link active" href="appeals-manager.html">Appeals</a>
    </div>
    <div class="nav-user">
      <div class="avatar" id="navAvatar">DR</div>
      <span class="nav-name" id="navUserName">Lecturer</span>
      <button class="btn btn-ghost btn-sm" onclick="AcadEx.logout()">Sign Out</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">Portal</div>
      <a class="sidebar-link" href="lecturer-dashboard.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span> Dashboard</a>
      <a class="sidebar-link" href="upload-materials.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Upload Materials</a>
      <a class="sidebar-link" href="manage-cbt.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/></svg></span> Manage CBT</a>
      <a class="sidebar-link active" href="appeals-manager.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="21"/><path d="M3 6l9-3 9 3"/><path d="M3 18l9-3 9 3"/></svg></span> Appeals</a>
      <div class="sidebar-section">Account</div>
      <a class="sidebar-link" href="#" onclick="AcadEx.logout()"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Sign Out</a>
    </aside>

    <main class="main">
      <div class="page-header animate-up">
        <div><h1 class="page-title">Appeals Manager</h1><p class="page-subtitle">Review and respond to student question appeals.</p></div>
        <div class="appeal-mgr-stats" id="appealMgrStats"></div>
      </div>

      <div class="appeals-filter animate-up delay-1">
        <button class="appeals-filter-btn active" onclick="filterAppeals('all',this)">All</button>
        <button class="appeals-filter-btn" onclick="filterAppeals('pending',this)">⏳ Pending</button>
        <button class="appeals-filter-btn" onclick="filterAppeals('approved',this)">✅ Approved</button>
        <button class="appeals-filter-btn" onclick="filterAppeals('rejected',this)">❌ Rejected</button>
      </div>

      <div class="appeals-manager-list animate-up delay-2" id="appealsList"></div>
    </main>
  </div>

  <!-- Response Modal -->
  <div class="modal-overlay" id="responseModal">
    <div class="modal response-modal">
      <h3 class="modal-title">Respond to Appeal</h3>
      <div class="appeal-detail-box" id="appealDetailBox"></div>
      <div class="form-group mt-16">
        <label class="form-label">Your Response</label>
        <textarea class="form-input" id="responseText" rows="4" placeholder="Explain your decision clearly..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeResponseModal()">Cancel</button>
        <button class="btn btn-danger btn-sm" onclick="respondToAppeal('rejected')">❌ Reject</button>
        <button class="btn btn-accent btn-sm" onclick="respondToAppeal('approved')">✅ Approve</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="firebase-config.js"></script>
  <script src="ai.js"></script>
  <script src="notifications.js"></script>
  <script src="appeals-manager.js"></script>
  <script src="nav.js"></script>
  <script src="accessibility.js"></script>
  <script src="darkmode.js"></script>
</body>
</html>
