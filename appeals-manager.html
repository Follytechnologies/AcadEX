<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadEx — Appeals Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="icons.css">
  <link rel="stylesheet" href="appeals-manager.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-brand"><div class="brand-logo-sm">Ax</div>Acad<span>Ex</span></div>
    <div class="nav-links">
      <a class="nav-link" href="lecturer-dashboard.html">🏠 Dashboard</a>
      <a class="nav-link" href="upload-materials.html">📤 Upload</a>
      <a class="nav-link" href="manage-cbt.html">📋 CBT</a>
      <a class="nav-link active" href="appeals-manager.html">⚖️ Appeals</a>
    </div>
    <div class="nav-user">
      <div class="avatar" id="navAvatar">DR</div>
      <span class="nav-name" id="navUserName">Lecturer</span>
      <button class="btn btn-ghost btn-sm" onclick="AcadEx.logout()">Sign Out</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">Portal</div>
      <a class="sidebar-link" href="lecturer-dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a class="sidebar-link" href="upload-materials.html"><span class="icon">📤</span> Upload Materials</a>
      <a class="sidebar-link" href="manage-cbt.html"><span class="icon">📋</span> Manage CBT</a>
      <a class="sidebar-link active" href="appeals-manager.html"><span class="icon">⚖️</span> Appeals</a>
      <div class="sidebar-section">Account</div>
      <a class="sidebar-link" href="#" onclick="AcadEx.logout()"><span class="icon">🚪</span> Sign Out</a>
    </aside>

    <main class="main">
      <div class="page-header animate-up">
        <div><h1 class="page-title">⚖️ Appeals Manager</h1><p class="page-subtitle">Review and respond to student question appeals.</p></div>
        <div class="appeal-mgr-stats" id="appealMgrStats"></div>
      </div>

      <div class="appeals-filter animate-up delay-1">
        <button class="appeals-filter-btn active" onclick="filterAppeals('all',this)">All</button>
        <button class="appeals-filter-btn" onclick="filterAppeals('pending',this)">⏳ Pending</button>
        <button class="appeals-filter-btn" onclick="filterAppeals('approved',this)">✅ Approved</button>
        <button class="appeals-filter-btn" onclick="filterAppeals('rejected',this)">❌ Rejected</button>
      </div>

      <div class="appeals-manager-list animate-up delay-2" id="appealsList"></div>
    </main>
  </div>

  <!-- Response Modal -->
  <div class="modal-overlay" id="responseModal">
    <div class="modal response-modal">
      <h3 class="modal-title">Respond to Appeal</h3>
      <div class="appeal-detail-box" id="appealDetailBox"></div>
      <div class="form-group mt-16">
        <label class="form-label">Your Response</label>
        <textarea class="form-input" id="responseText" rows="4" placeholder="Explain your decision clearly..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeResponseModal()">Cancel</button>
        <button class="btn btn-danger btn-sm" onclick="respondToAppeal('rejected')">❌ Reject</button>
        <button class="btn btn-accent btn-sm" onclick="respondToAppeal('approved')">✅ Approve</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="appeals-manager.js"></script>
  <script src="nav.js"></script>
</body>
</html>
