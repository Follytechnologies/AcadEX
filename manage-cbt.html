  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">Portal</div>
      <a class="sidebar-link" href="lecturer-dashboard.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span> Dashboard</a>
      <a class="sidebar-link" href="upload-materials.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Upload Materials</a>
      <a class="sidebar-link active" href="manage-cbt.html"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/></svg></span> Manage CBT</a>

      <div class="sidebar-section">Account</div>
      <a class="sidebar-link" href="#" onclick="AcadEx.logout()"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Sign Out</a>
    </aside>

    <main class="main">
      <div class="page-header animate-up">
        <div><h1 class="page-title">📋 Manage CBT Tests</h1><p class="page-subtitle">Create, monitor, and analyse student CBT performance.</p></div>
        <button class="btn btn-primary" onclick="showCreateForm()">Create Test</button>
      </div>

      <!-- Create Form -->
      <div class="card animate-up delay-1" id="createForm" style="display:none">
        <div class="card-head"><h3 class="card-title">Create New CBT Test</h3><button class="btn btn-ghost btn-sm" onclick="hideCreateForm()">✕</button></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Test Title</label><input type="text" class="form-input" id="testTitle" placeholder="e.g. MTH 101 — Week 5 Quiz"></div>
          <div class="form-group"><label class="form-label">Course</label>
            <select class="form-select" id="testCourse"><option>MTH 101</option><option>MTH 201</option><option>MTH 301</option></select>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Duration (minutes)</label><input type="number" class="form-input" id="testDuration" value="30" min="5" max="180"></div>
          <div class="form-group"><label class="form-label">Total Questions</label><input type="number" class="form-input" id="testQuestions" value="20" min="5" max="100"></div>
        </div>
        <button class="btn btn-primary" onclick="createTest()">Create Test</button>
      </div>

      <!-- Tests List -->
      <div class="tests-list animate-up delay-2" id="testsList"></div>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="manage-cbt.js"></script>
  <script src="nav.js"></script>
  <script src="accessibility.js"></script>
  <script src="darkmode.js"></script>
</body>
</html>
